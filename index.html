<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#071D49" />
  <title>OPPA Sheet Digitizer · PIES · Pactics Cambodia</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Noto+Sans+Khmer:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Tesseract.js — free, open-source OCR running entirely in the browser. No API key. -->
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

  <style>
    body { margin: 0; padding: 0; }
    .pies-root { font-family: 'IBM Plex Sans', system-ui, sans-serif; color: #1A1A1A; background: #F8F9FA; }
    .ff-mono { font-family: 'IBM Plex Mono', ui-monospace, monospace; }
    .ff-khmer { font-family: 'Noto Sans Khmer', 'IBM Plex Sans', sans-serif; }

    .bg-navy { background-color: #071D49; }
    .bg-orange { background-color: #C45911; }
    .bg-yellow { background-color: #FFF2CC; }
    .bg-green-soft { background-color: #EAF5EC; }
    .bg-card { background-color: #FFFFFF; }
    .bg-navy-soft { background-color: #F1F3F8; }

    .text-navy { color: #071D49; }
    .text-orange { color: #C45911; }
    .text-green { color: #2E7D32; }
    .text-mute { color: rgba(26,26,26,0.55); }
    .text-faint { color: rgba(26,26,26,0.40); }

    .border-line { border-color: #D0D0D0; }
    .border-navy { border-color: #071D49; }
    .border-orange { border-color: #C45911; }
    .border-green { border-color: #2E7D32; }

    .btn-primary { background:#071D49; color:white; transition: background-color .15s; }
    .btn-primary:hover:not(:disabled) { background:#10069F; }
    .btn-primary:disabled { opacity:.5; cursor:not-allowed; }
    .btn-warn { background:#C45911; color:white; transition: opacity .15s; }
    .btn-warn:hover:not(:disabled) { opacity:.88; }
    .btn-ghost { background:white; color:#1A1A1A; border:1px solid #D0D0D0; transition: all .15s; }
    .btn-ghost:hover:not(:disabled) { border-color:#071D49; color:#071D49; }
    .btn-ghost:disabled { opacity:.5; cursor:not-allowed; }

    .dropzone {
      background-image: radial-gradient(#D0D0D0 1px, transparent 1px);
      background-size: 24px 24px;
      border: 2px dashed rgba(7,29,73,0.35);
      transition: border-color .2s, background-color .2s;
    }
    .dropzone:hover { border-color: #071D49; background-color: rgba(7,29,73,0.025); }

    .grid-cell-input { background: transparent; border: 1px solid transparent; padding: 2px 4px; width: 100%; font: inherit; color: inherit; }
    .grid-cell-input:focus { outline: none; background: white; border-color: #071D49; }

    table.oppa-table { width: 100%; border-collapse: collapse; font-size: 11px; }
    table.oppa-table thead th { background: #071D49; color: white; font-weight: 500; padding: 10px 6px; text-align: left; font-size: 10px; letter-spacing: 0.05em; text-transform: uppercase; }
    table.oppa-table thead th.col-total { background: #C45911; text-align: center; }
    table.oppa-table thead th.col-slot { text-align: center; font-family: 'IBM Plex Mono', monospace; font-size: 9px; padding: 10px 2px; white-space: nowrap; }
    table.oppa-table tbody tr { border-bottom: 1px solid #E5E5E5; }
    table.oppa-table tbody tr.row-alt { background: #F8F9FB; }
    table.oppa-table tbody td { padding: 2px 4px; vertical-align: middle; }
    table.oppa-table tbody td.cell-total { text-align: center; font-family: 'IBM Plex Mono', monospace; font-weight: 600; background: rgba(196,89,17,0.06); }
    table.oppa-table tfoot tr { background: #F1F3F8; border-top: 2px solid #071D49; }
    table.oppa-table tfoot td { padding: 8px 6px; font-family: 'IBM Plex Mono', monospace; font-weight: 700; color: #071D49; text-align: center; }
    table.oppa-table tfoot td.label-cell { text-align: left; font-size: 10px; letter-spacing: 0.05em; text-transform: uppercase; }
    table.oppa-table tfoot td.grand { background: #C45911; color: white; }
    .row-delete { color: rgba(26,26,26,0.30); font-size: 16px; line-height: 1; padding: 0 4px; transition: color .15s; cursor: pointer; background: none; border: none; }
    .row-delete:hover { color: #C45911; }

    .badge-model { display: inline-flex; align-items: center; gap: 6px; background: rgba(255,255,255,0.1); padding: 4px 9px; border-radius: 2px; font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: rgba(255,255,255,0.85); letter-spacing: 0.05em; }
    .pulse-dot { width: 6px; height: 6px; border-radius: 50%; background: #4ADE80; box-shadow: 0 0 0 0 rgba(74, 222, 128, 0.7); animation: pulse 2s infinite; }
    @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(74, 222, 128, 0.7); } 70% { box-shadow: 0 0 0 6px rgba(74, 222, 128, 0); } 100% { box-shadow: 0 0 0 0 rgba(74, 222, 128, 0); } }

    .spin { animation: spin 1s linear infinite; }
    @keyframes spin { from { transform: rotate(0); } to { transform: rotate(360deg); } }

    .progress-track { height: 6px; background: #E5E5E5; border-radius: 3px; overflow: hidden; }
    .progress-fill { height: 100%; background: #071D49; transition: width .3s; }

    .boot-loader { display: flex; align-items: center; justify-content: center; min-height: 100vh; flex-direction: column; gap: 12px; font-family: 'IBM Plex Mono', monospace; color: #071D49; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #C45911; animation: bounce 1.4s infinite both; }
    @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
  </style>
</head>
<body>
  <div id="root">
    <div class="boot-loader">
      <div style="display:flex; gap:6px;"><div class="dot"></div><div class="dot" style="animation-delay:.16s"></div><div class="dot" style="animation-delay:.32s"></div></div>
      <div style="font-size:11px; letter-spacing:.15em; text-transform:uppercase;">Loading OPPA Digitizer</div>
    </div>
  </div>

  <script>
    const SLOTS = ["7-8","8-9","9-10","10-11","11:30-12:30","12:30-13:30","13:30-14:30","14:30-15:30","15:30-16:30","16:30-17:30"];

    const state = {
      imageDataUrl: null,
      rows: [],          // each: {worker_id, worker_name_khmer, product_type, ob_number, operation_khmer, counts:[]}
      header: { form_type: 'OPPA', date: '' },
      busy: false,
      progress: 0,
      progressLabel: '',
      rawText: '',
      error: null,
      stage: 'upload',   // upload | preview | result
      copied: false
    };

    const root = document.getElementById('root');

    function emptyRow() {
      return { worker_id:'', worker_name_khmer:'', product_type:'', ob_number:'', operation_khmer:'', counts: Array(SLOTS.length).fill(null) };
    }

    function rowTotal(counts){ return counts.reduce((s,c)=> s + (typeof c==='number'?c:(parseFloat(c)||0)), 0); }
    function colTotals(){ return SLOTS.map((_,i)=> state.rows.reduce((s,r)=>{ const v=r.counts[i]; return s + (typeof v==='number'?v:(parseFloat(v)||0)); },0)); }
    function grandTotal(){ return colTotals().reduce((a,b)=>a+b,0); }
    function workerCount(){ return new Set(state.rows.map(r=>r.worker_id).filter(Boolean)).size; }

    function esc(s){ return (s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

    /* ---------------- OCR ---------------- */
    async function runOCR() {
      if (!state.imageDataUrl) return;
      state.busy = true; state.error = null; state.progress = 0; state.progressLabel = 'Starting OCR engine…';
      render();

      try {
        // Recognize with both Khmer and English language packs
        const worker = await Tesseract.createWorker(['khm','eng'], 1, {
          logger: m => {
            if (m.status && typeof m.progress === 'number') {
              state.progress = Math.round(m.progress * 100);
              state.progressLabel = m.status.replace(/_/g,' ');
              render();
            }
          }
        });

        const { data } = await worker.recognize(state.imageDataUrl);
        await worker.terminate();

        state.rawText = data.text || '';
        parseTextToRows(data);
        state.stage = 'result';
      } catch (e) {
        state.error = 'OCR failed: ' + (e && e.message ? e.message : String(e));
      } finally {
        state.busy = false;
        render();
      }
    }

    // Heuristic: turn Tesseract output into rows.
    // Tesseract gives us lines; we look for a 9-digit worker ID and pull numbers out.
    function parseTextToRows(data) {
      const lines = (data.text || '').split('\n').map(l => l.trim()).filter(Boolean);
      const rows = [];

      // Try to find a date like DD.MM.YY in the whole text
      const dateMatch = (data.text || '').match(/\b(\d{1,2}[.\-/]\d{1,2}[.\-/]\d{2,4})\b/);
      if (dateMatch) state.header.date = dateMatch[1];

      for (const line of lines) {
        // Worker ID = first 9-digit run
        const idMatch = line.match(/\b(\d{9})\b/);
        // All standalone 1-3 digit numbers (candidate counts), excluding the 9-digit id
        let rest = line;
        if (idMatch) rest = rest.replace(idMatch[1], ' ');
        const nums = (rest.match(/\b\d{1,3}\b/g) || []).map(Number);

        // Khmer text on the line
        const khmer = (line.match(/[\u1780-\u17FF]+/g) || []).join(' ');

        // Product type: latin words (Aion, Double Chin, PMS-0050, etc.)
        const latin = (rest.match(/[A-Za-z][A-Za-z\-]{1,}(?:\s\d{2,})?/g) || []).join(' ').trim();

        // Only build a row if the line carries something useful
        if (idMatch || nums.length >= 3 || khmer) {
          const r = emptyRow();
          if (idMatch) r.worker_id = idMatch[1];
          if (khmer) {
            // first khmer chunk likely the name, rest the operation (rough)
            r.worker_name_khmer = khmer.split(' ')[0] || '';
            r.operation_khmer = khmer.split(' ').slice(1).join(' ');
          }
          if (latin) r.product_type = latin;
          // Fill counts left to right from the numbers we found
          for (let i = 0; i < Math.min(nums.length, SLOTS.length); i++) r.counts[i] = nums[i];
          rows.push(r);
        }
      }

      state.rows = rows.length ? rows : [emptyRow()];
    }

    /* ---------------- File handling ---------------- */
    function handleFile(file) {
      if (!file) return;
      if (!/^image\//.test(file.type)) { state.error = 'Please choose an image file (PNG, JPG, WebP).'; render(); return; }
      state.error = null;
      const reader = new FileReader();
      reader.onload = e => { state.imageDataUrl = e.target.result; state.stage = 'preview'; render(); };
      reader.readAsDataURL(file);
    }

    /* ---------------- Exports ---------------- */
    function buildMatrix() {
      const headers = ['WorkerID','Worker Name (Khmer)','Product Type','OB #','Operation', ...SLOTS, 'Daily Total'];
      const body = state.rows.map(r => [r.worker_id, r.worker_name_khmer, r.product_type, r.ob_number, r.operation_khmer, ...r.counts.map(c=>c==null?'':c), rowTotal(r.counts)]);
      body.push(['TOTAL','','','','', ...colTotals(), grandTotal()]);
      return { headers, body };
    }
    function exportCSV() {
      const { headers, body } = buildMatrix();
      const escc = v => { const s=(v==null?'':String(v)); return /[",\n]/.test(s) ? '"'+s.replace(/"/g,'""')+'"' : s; };
      const csv = '\uFEFF' + [headers, ...body].map(r=>r.map(escc).join(',')).join('\n');
      const blob = new Blob([csv], {type:'text/csv;charset=utf-8'});
      const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
      a.download = 'OPPA_'+(state.header.date||'sheet').replace(/[^\w.-]/g,'_')+'.csv'; a.click();
      URL.revokeObjectURL(a.href);
    }
    async function copyTable() {
      const { headers, body } = buildMatrix();
      const text = [headers, ...body].map(r=>r.join('\t')).join('\n');
      try {
        await navigator.clipboard.writeText(text);
      } catch (e) {
        const ta=document.createElement('textarea'); ta.value=text; ta.style.position='fixed'; ta.style.opacity='0';
        document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
      }
      state.copied = true; render(); setTimeout(()=>{ state.copied=false; render(); }, 2000);
    }

    function reset(){ state.imageDataUrl=null; state.rows=[]; state.header={form_type:'OPPA',date:''}; state.rawText=''; state.error=null; state.stage='upload'; render(); }
    function addRow(){ state.rows.push(emptyRow()); render(); }
    function delRow(i){ state.rows.splice(i,1); render(); }

    /* ---------------- Render ---------------- */
    function render() {
      const c = colTotals();
      root.innerHTML = `
        <div class="pies-root min-h-screen">
          <header class="bg-navy" style="border-bottom:4px solid #C45911">
            <div class="px-6 py-4 flex items-center justify-between" style="max-width:1600px;margin:0 auto">
              <div class="flex items-center gap-4">
                <div class="ff-mono text-white font-bold" style="font-size:22px;letter-spacing:.2em">PIES</div>
                <div style="height:30px;width:1px;background:rgba(255,255,255,.25)"></div>
                <div>
                  <div class="ff-mono text-xs uppercase" style="color:rgba(255,255,255,.6);letter-spacing:.15em">Pactics Industrial Engineering System</div>
                  <div class="text-base font-semibold text-white">OPPA Sheet Digitizer</div>
                </div>
              </div>
              <div class="flex items-center gap-3">
                <span class="badge-model"><span class="pulse-dot"></span>Tesseract OCR · free</span>
                <span class="ff-mono text-xs uppercase" style="color:rgba(255,255,255,.5);letter-spacing:.1em">v1.0 · Siem Reap</span>
              </div>
            </div>
          </header>

          <main class="px-6 py-8" style="max-width:1600px;margin:0 auto">
            ${state.stage === 'upload' ? renderUpload() : ''}
            ${state.stage === 'preview' ? renderPreview() : ''}
            ${state.stage === 'result' ? renderResult(c) : ''}
            ${state.error ? `
              <div class="bg-yellow border border-orange p-4 flex items-start gap-3 mt-5">
                <div class="flex-1 text-sm"><div class="font-semibold text-orange">Something went wrong</div><div class="ff-mono text-xs mt-1">${esc(state.error)}</div></div>
                <button onclick="state.error=null;render()" class="text-mute">✕</button>
              </div>` : ''}
          </main>

          <footer class="border-t border-line bg-card mt-12">
            <div class="px-6 py-4 flex items-center justify-between ff-mono text-xs text-faint" style="max-width:1600px;margin:0 auto">
              <div>Pactics Cambodia · PIES IE Tooling</div>
              <div>Free · in-browser OCR · no login required</div>
            </div>
          </footer>
        </div>`;
      wire();
    }

    function renderUpload() {
      return `
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
          <div class="lg:col-span-2">
            <div id="dropzone" class="dropzone bg-card flex flex-col items-center justify-center cursor-pointer p-12 text-center" style="aspect-ratio:4/3">
              <div class="flex items-center justify-center mb-6 border-2 border-navy" style="width:80px;height:80px;font-size:36px">🖼️</div>
              <div class="text-2xl font-semibold mb-2 text-navy">Drop OPPA sheet image here</div>
              <div class="ff-mono text-sm text-mute mb-6">or click to browse · PNG / JPG / WebP</div>
              <button class="btn-primary ff-mono px-6 py-3 text-sm uppercase" style="letter-spacing:.15em">Select image</button>
              <input id="fileInput" type="file" accept="image/*" class="hidden" />
            </div>
          </div>
          <aside class="bg-card border border-line p-6">
            <div class="ff-mono text-xs uppercase text-orange mb-1" style="letter-spacing:.15em">How it works</div>
            <div class="text-lg font-semibold text-navy mb-4">Three steps</div>
            <ol class="space-y-4 text-sm">
              <li class="flex gap-4"><div class="ff-mono text-xs text-orange" style="width:24px">01</div><div><div class="font-semibold text-navy">Upload the sheet photo</div><div class="text-mute" style="font-size:12px">Flat, well-lit, straight-on shots read best.</div></div></li>
              <li class="flex gap-4"><div class="ff-mono text-xs text-orange" style="width:24px">02</div><div><div class="font-semibold text-navy">OCR reads it in your browser</div><div class="text-mute" style="font-size:12px">Free Tesseract engine with Khmer + English. Nothing leaves your device.</div></div></li>
              <li class="flex gap-4"><div class="ff-mono text-xs text-orange" style="width:24px">03</div><div><div class="font-semibold text-navy">Review, fix & export</div><div class="text-mute" style="font-size:12px">Edit any cell, then Copy or Export CSV.</div></div></li>
            </ol>
            <div class="bg-navy-soft border border-line p-3 mt-5 text-xs text-mute">
              <span class="font-semibold text-navy">Note:</span> free in-browser OCR is less accurate on messy handwriting than paid AI. Expect to correct some cells — especially handwritten Khmer and unclear digits.
            </div>
          </aside>
        </div>`;
    }

    function renderPreview() {
      return `
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
          <div class="lg:col-span-2 bg-card border border-line p-4">
            <img src="${state.imageDataUrl}" style="width:100%;height:auto;display:block" />
          </div>
          <aside class="bg-card border border-line p-6">
            <div class="ff-mono text-xs uppercase text-orange mb-1" style="letter-spacing:.15em">${state.busy ? 'Reading sheet' : 'Image loaded'}</div>
            <div class="text-xl font-semibold text-navy mb-4">${state.busy ? 'Working…' : 'Ready to read'}</div>
            ${state.busy ? `
              <div class="mb-3">
                <div class="flex justify-between ff-mono text-xs text-mute mb-1"><span>${esc(state.progressLabel)}</span><span>${state.progress}%</span></div>
                <div class="progress-track"><div class="progress-fill" style="width:${state.progress}%"></div></div>
              </div>
              <div class="ff-mono text-xs text-faint">First run downloads the Khmer language pack (~15MB). Later runs are faster.</div>
            ` : `
              <p class="text-sm text-mute mb-5">OCR runs entirely in your browser — no upload, no account, no cost. First run downloads the Khmer language pack (~15MB), so it may take 30–60 seconds.</p>
              <button id="runBtn" class="btn-primary ff-mono w-full px-6 py-4 text-sm uppercase mb-3" style="letter-spacing:.15em">Read sheet</button>
              <button id="resetBtn" class="btn-ghost ff-mono w-full px-6 py-3 text-sm uppercase" style="letter-spacing:.15em">Choose different image</button>
            `}
          </aside>
        </div>`;
    }

    function renderResult(c) {
      return `
        <div>
          <div class="flex flex-wrap items-center justify-between gap-3 mb-5 pb-4 border-b border-line">
            <div class="flex items-center gap-4 flex-wrap">
              <div class="ff-mono text-xs uppercase text-orange" style="letter-spacing:.15em">Sheet header</div>
              <div class="flex items-center gap-2"><label class="ff-mono text-xs text-mute">FORM</label><input id="hForm" value="${esc(state.header.form_type)}" class="ff-mono text-sm px-2 py-1 border border-line" style="width:80px" /></div>
              <div class="flex items-center gap-2"><label class="ff-mono text-xs text-mute">DATE</label><input id="hDate" value="${esc(state.header.date)}" placeholder="DD.MM.YY" class="ff-mono text-sm px-2 py-1 border border-line" style="width:110px" /></div>
              <div class="ff-mono text-xs text-faint">${state.rows.length} rows · ${workerCount()} workers</div>
            </div>
            <div class="flex items-center gap-2 flex-wrap">
              <button id="copyBtn" class="btn-ghost ff-mono text-xs uppercase px-3 py-2" style="letter-spacing:.1em;${state.copied?'border-color:#2E7D32;color:#2E7D32':''}">${state.copied?'✓ Copied!':'Copy'}</button>
              <button id="csvBtn" class="btn-primary ff-mono text-xs uppercase px-4 py-2" style="letter-spacing:.1em">Export CSV</button>
              <button id="newBtn" class="btn-warn ff-mono text-xs uppercase px-3 py-2" style="letter-spacing:.1em">New</button>
            </div>
          </div>

          <div class="bg-navy-soft border border-line p-3 mb-4 text-sm">
            <span class="font-semibold text-navy">Check everything:</span>
            <span class="text-mute"> free OCR makes mistakes, especially on handwriting. Compare against the image on the left and fix any cell by clicking it. The numbers and layout are a starting point, not final.</span>
          </div>

          <div class="grid gap-6" style="grid-template-columns:360px 1fr">
            <div class="bg-card border border-line p-3" style="align-self:start;position:sticky;top:16px">
              <img src="${state.imageDataUrl}" style="width:100%;height:auto;display:block" />
              <div class="ff-mono text-xs text-faint mt-2 text-center">Source image (reference)</div>
            </div>
            <div class="bg-card border border-line" style="overflow-x:auto">
              <table class="oppa-table">
                <thead><tr>
                  <th>Worker ID</th><th>Name (KH)</th><th>Product</th><th>OB#</th><th>Operation</th>
                  ${SLOTS.map(s=>`<th class="col-slot">${s}</th>`).join('')}
                  <th class="col-total">Total</th><th style="width:28px"></th>
                </tr></thead>
                <tbody>
                  ${state.rows.map((r,idx)=>`
                    <tr class="${idx%2?'row-alt':''}">
                      <td><input class="grid-cell-input ff-mono" data-row="${idx}" data-field="worker_id" value="${esc(r.worker_id)}" style="width:100px;font-size:11px" /></td>
                      <td><input class="grid-cell-input ff-khmer" data-row="${idx}" data-field="worker_name_khmer" value="${esc(r.worker_name_khmer)}" style="width:120px;font-size:14px" /></td>
                      <td><input class="grid-cell-input" data-row="${idx}" data-field="product_type" value="${esc(r.product_type)}" style="width:100px;font-size:11px" /></td>
                      <td><input class="grid-cell-input ff-mono" data-row="${idx}" data-field="ob_number" value="${esc(r.ob_number)}" style="width:56px;font-size:11px" /></td>
                      <td><input class="grid-cell-input ff-khmer" data-row="${idx}" data-field="operation_khmer" value="${esc(r.operation_khmer)}" style="width:150px;font-size:14px" /></td>
                      ${r.counts.map((cc,ci)=>`<td><input class="grid-cell-input ff-mono" data-row="${idx}" data-count="${ci}" value="${cc==null?'':esc(cc)}" style="width:44px;font-size:11px;text-align:center" /></td>`).join('')}
                      <td class="cell-total">${rowTotal(r.counts)||''}</td>
                      <td><button class="row-delete" data-del="${idx}" title="Delete row">×</button></td>
                    </tr>`).join('')}
                </tbody>
                <tfoot><tr>
                  <td colspan="5" class="label-cell">Column total</td>
                  ${c.map(t=>`<td>${t||''}</td>`).join('')}
                  <td class="grand">${grandTotal()}</td><td></td>
                </tr></tfoot>
              </table>
              <div class="border-t border-line p-3"><button id="addRowBtn" class="ff-mono text-xs uppercase text-navy" style="letter-spacing:.1em">+ Add row</button></div>
            </div>
          </div>

          <details class="mt-4">
            <summary class="cursor-pointer ff-mono text-xs text-faint">Show raw OCR text</summary>
            <pre class="mt-2 p-3 bg-card border border-line ff-khmer" style="font-size:11px;white-space:pre-wrap;max-height:240px;overflow:auto">${esc(state.rawText)}</pre>
          </details>
        </div>`;
    }

    /* ---------------- Wire events ---------------- */
    function wire() {
      const fi = document.getElementById('fileInput');
      const dz = document.getElementById('dropzone');
      if (dz && fi) {
        dz.onclick = () => fi.click();
        fi.onchange = e => handleFile(e.target.files && e.target.files[0]);
        dz.ondragover = e => e.preventDefault();
        dz.ondrop = e => { e.preventDefault(); handleFile(e.dataTransfer.files && e.dataTransfer.files[0]); };
      }
      const runBtn = document.getElementById('runBtn'); if (runBtn) runBtn.onclick = runOCR;
      const resetBtn = document.getElementById('resetBtn'); if (resetBtn) resetBtn.onclick = reset;
      const newBtn = document.getElementById('newBtn'); if (newBtn) newBtn.onclick = reset;
      const csvBtn = document.getElementById('csvBtn'); if (csvBtn) csvBtn.onclick = exportCSV;
      const copyBtn = document.getElementById('copyBtn'); if (copyBtn) copyBtn.onclick = copyTable;
      const addRowBtn = document.getElementById('addRowBtn'); if (addRowBtn) addRowBtn.onclick = addRow;
      const hForm = document.getElementById('hForm'); if (hForm) hForm.oninput = e => state.header.form_type = e.target.value;
      const hDate = document.getElementById('hDate'); if (hDate) hDate.oninput = e => state.header.date = e.target.value;

      document.querySelectorAll('input[data-field]').forEach(inp => {
        inp.oninput = e => { const i=+e.target.dataset.row, f=e.target.dataset.field; state.rows[i][f]=e.target.value; };
      });
      document.querySelectorAll('input[data-count]').forEach(inp => {
        inp.oninput = e => {
          const i=+e.target.dataset.row, ci=+e.target.dataset.count, v=e.target.value.trim();
          state.rows[i].counts[ci] = v==='' ? null : (isNaN(Number(v)) ? v : Number(v));
          // live-update totals without losing focus: update only the total cells
          const tr = e.target.closest('tr');
          if (tr) tr.querySelector('.cell-total').textContent = rowTotal(state.rows[i].counts)||'';
        };
      });
      document.querySelectorAll('button[data-del]').forEach(b => { b.onclick = () => delRow(+b.dataset.del); });
    }

    render();
  </script>
</body>
</html>
