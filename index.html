THE FORM
═══════════════════════════════════════════════════════════════

Header at top: form type (typically "OPPA") and a date in DD.MM.YY format.

Table columns (left → right):

  6–15. Ten hourly time-slot columns with handwritten piece counts:

     13:30-14:30, 14:30-15:30, 15:30-16:30, 16:30-17:30

Each WorkerID is repeated in 5 stacked sub-rows so an operator can record multiple operations per day. Many sub-rows are empty.

═══════════════════════════════════════════════════════════════
KHMER READING GUIDANCE (HIGH PRIORITY)
═══════════════════════════════════════════════════════════════

This is the hardest part of the task. Read Khmer with maximum care.

Khmer script primer:
• Consonants: ក ខ គ ឃ ង ច ឆ ជ ឈ ញ ដ ឋ ឌ ឍ ណ ត ថ ទ ធ ន ប ផ ព ភ ម យ រ ល វ ស ហ ឡ អ
• Independent vowels: ឥ ឦ ឧ ឩ ឪ ឫ ឬ ឭ ឮ ឯ ឰ ឱ ឲ ឳ
• Vowel signs: ា ិ ី ឹ ឺ ុ ូ ួ ើ ឿ ៀ េ ែ ៃ ោ ៅ
• Subscripts (coeng): ្ + consonant (sits below the base consonant)
• Diacritics: ំ ះ ៉ ៊ ់ ៌ ៍ ៎ ៏ ័

Commonly confused character pairs in handwriting:
• ស vs ច (often look identical in fast handwriting)
• ត vs ដ vs ឥ
• ន vs ណ
• ប vs ភ vs ផ
• រ vs ឫ vs វ
• ច vs ខ
• ឆ vs ច + diacritic
• ោ vs ៅ
• ុ vs ូ vs ួ

Cambodian name structure: family name (1–2 syllables) + space + given name (1–3 syllables).
Common name patterns (illustrative — read what's actually written, do not force a match):
  Family names: កុន, ឈឹម, រ៉ាន់, លី, ហុក, សុខ, ឈុន, វ៉ាន់, ឆាយ, លឹម, ឈួន, តាន់, ឆុន, ឡុង
  Given names: សុបិន, សារុន, គូលាប, រស្មី, សុធា, សុភ័ក្ត្រ, វិសាល, ភក្តី, ស៊ីម, រ៉ាវី, សុមាលី, ដារា

Common operation verbs you'll see in column 5:
  ដេរ (sew), កាត់ (cut), ត្រឹម (trim), បត់ (fold), គូស (mark),
  ដាក់ (place), ផ្ដិត (press), ត្រួត (inspect), ខ្ចប់ (pack)

Operation phrases often combine verb + product part:
  ដេរក្បាល = sew the head/top
  ដេរបន្ទះ = sew the panel
  កាត់ខ្សែ = cut the strap
  បត់មាត់ = fold the opening

═══════════════════════════════════════════════════════════════
EXTRACTION RULES
═══════════════════════════════════════════════════════════════

• Only include rows that have actual data in Product Type, Operation, OR any hourly count. Skip blank sub-rows.
• Preserve worker grouping order top to bottom.
• Counts are 1–3 digit integers. If a digit is genuinely unclear, give your best reading and append "?" (e.g., "50?"). Use null for clearly empty cells.
• Do NOT invent data. If a cell is truly unreadable, use null.
• Preserve writer's spelling on Product Type (keep "Duble Chin" if that's what's written — do NOT silently correct to "Double Chin").
• For Khmer cells: render the cleanest Unicode Khmer reading. If you are unsure between two candidates, pick the most likely and append "?" at the very end of that cell only.
• Worker IDs and Khmer names are PRE-PRINTED (typed), not handwritten — they are easier to read than the handwritten columns. Read them carefully.

    /* ---------- App component ---------- */
    function OPPADigitizer() {
      const [imageFile, setImageFile] = useState(null);
      const [imagePreview, setImagePreview] = useState(null);
      const [extracted, setExtracted] = useState(null);
      const [loading, setLoading] = useState(false);
      const [refining, setRefining] = useState(false);
      const [error, setError] = useState(null);
      const [rawResponse, setRawResponse] = useState('');
      const [showImage, setShowImage] = useState(true);
      const [refineMessage, setRefineMessage] = useState('');
      const fileInputRef = useRef(null);

      const handleFile = (file) => {
        if (!file) return;
        if (!SUPPORTED_MIME.includes(file.type)) {
          setError(`Unsupported image type "${file.type || 'unknown'}". Use PNG, JPG, GIF, or WebP. (HEIC must be converted first.)`);
          return;
        }
        setError(null);
        setRawResponse('');
        setRefineMessage('');
        setImageFile(file);
        setExtracted(null);
        const reader = new FileReader();
        reader.onload = (e) => setImagePreview(e.target.result);
        reader.readAsDataURL(file);
      };

      const onDrop = (e) => {
        e.preventDefault();
        if (e.dataTransfer.files && e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
      };

      const fileToBase64 = (file) => new Promise((resolve, reject) => {
        const r = new FileReader();
        r.onload = () => resolve(r.result.split(',')[1]);
        r.onerror = () => reject(new Error('Could not read image file'));
        r.readAsDataURL(file);
      });

      const callClaude = async (prompt, base64, mediaType) => {
        const response = await fetch(API_ENDPOINT, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            model: MODEL_ID,
            max_tokens: 6000,
            messages: [{
              role: "user",
              content: [
                { type: "image", source: { type: "base64", media_type: mediaType, data: base64 } },
                { type: "text", text: prompt }
              ]
            }]
          })
        });
        if (!response.ok) {
          const errText = await response.text();
          throw new Error(`API error ${response.status}: ${errText.slice(0, 400)}`);
        }
        const data = await response.json();
        let text = (data.content || [])
          .filter(b => b.type === 'text')
          .map(b => b.text || '')
          .join('');
        return text;
      };

      const parseJSON = (text) => {
        text = text.replace(/```json\s*/g, '').replace(/```\s*$/g, '').trim();
        const start = text.indexOf('{');
        const end = text.lastIndexOf('}');
        if (start < 0 || end < 0) throw new Error('No JSON object found in response');
        return JSON.parse(text.slice(start, end + 1));
      };

      const extractData = async () => {
        if (!imageFile) return;
        setLoading(true);
        setError(null);
        setRawResponse('');
        setRefineMessage('');

        try {
          const base64 = await fileToBase64(imageFile);
          const text = await callClaude(EXTRACTION_PROMPT, base64, imageFile.type);
          setRawResponse(text);
          const parsed = parseJSON(text);

          const slots = (parsed.time_slots && parsed.time_slots.length === 10) ? parsed.time_slots : DEFAULT_SLOTS;
          parsed.time_slots = slots;
          parsed.header = parsed.header || { form_type: 'OPPA', date: '', notes: '' };
          parsed.rows = (parsed.rows || []).map(r => ({
            worker_id: r.worker_id || '',
            worker_name_khmer: r.worker_name_khmer || '',
            product_type: r.product_type || '',
            ob_number: r.ob_number || '',
            operation_khmer: r.operation_khmer || '',
            counts: Array.from({ length: slots.length }, (_, i) =>
              (r.counts && r.counts[i] !== undefined) ? r.counts[i] : null
            )
          }));
          setExtracted(parsed);
        } catch (e) {
          setError(`Extraction failed: ${e.message}`);
        } finally {
          setLoading(false);
        }
      };

      const refineKhmer = async () => {
        if (!imageFile || !extracted) return;
        setRefining(true);
        setError(null);
        setRefineMessage('');

        try {
          const base64 = await fileToBase64(imageFile);
          const prompt = buildRefinePrompt(extracted.rows);
          const text = await callClaude(prompt, base64, imageFile.type);
          setRawResponse(text);
          const parsed = parseJSON(text);

          if (!Array.isArray(parsed.refined)) {
            throw new Error('Refined response missing "refined" array');
          }

          let updated = 0;
          setExtracted(prev => {
            const next = { ...prev, rows: prev.rows.map(r => ({ ...r })) };
            parsed.refined.forEach(ref => {
              const idx = ref.index;
              if (typeof idx === 'number' && idx >= 0 && idx < next.rows.length) {
                if (ref.worker_name_khmer !== undefined) {
                  next.rows[idx].worker_name_khmer = ref.worker_name_khmer;
                }
                if (ref.operation_khmer !== undefined) {
                  next.rows[idx].operation_khmer = ref.operation_khmer;
                }
                updated++;
              }
            });
            return next;
          });
          setRefineMessage(`Refined Khmer text on ${updated} row${updated === 1 ? '' : 's'}. Verify against the source image.`);
        } catch (e) {
          setError(`Khmer refinement failed: ${e.message}`);
        } finally {
          setRefining(false);
        }
      };

      const updateCell = (rowIdx, field, value) => {
        setExtracted(prev => {
          const next = { ...prev, rows: [...prev.rows] };
          next.rows[rowIdx] = { ...next.rows[rowIdx], [field]: value };
          return next;
        });
      };

      const updateCount = (rowIdx, slotIdx, value) => {
        setExtracted(prev => {
          const next = { ...prev, rows: [...prev.rows] };
          const newCounts = [...next.rows[rowIdx].counts];
          const trimmed = (value == null ? '' : value).toString().trim();
          newCounts[slotIdx] = trimmed === ''
            ? null
            : (isNaN(Number(trimmed)) || trimmed.includes('?') ? trimmed : Number(trimmed));
          next.rows[rowIdx] = { ...next.rows[rowIdx], counts: newCounts };
          return next;
        });
      };

      const updateHeader = (field, value) => {
        setExtracted(prev => ({ ...prev, header: { ...prev.header, [field]: value } }));
      };

      const addRow = () => {
        setExtracted(prev => ({
          ...prev,
          rows: [...prev.rows, {
            worker_id: '', worker_name_khmer: '', product_type: '',
            ob_number: '', operation_khmer: '',
            counts: Array(prev.time_slots.length).fill(null)
          }]
        }));
      };

      const deleteRow = (idx) => {
        setExtracted(prev => ({ ...prev, rows: prev.rows.filter((_, i) => i !== idx) }));
      };

      const rowTotal = (counts) =>
        counts.reduce((s, c) => s + (typeof c === 'number' ? c : 0), 0);

      const colTotals = useMemo(() => {
        if (!extracted) return [];
        return extracted.time_slots.map((_, slotIdx) =>
          extracted.rows.reduce((s, r) =>
            s + (typeof r.counts[slotIdx] === 'number' ? r.counts[slotIdx] : 0), 0)
        );
      }, [extracted]);

      const grandTotal = useMemo(() => colTotals.reduce((a, b) => a + b, 0), [colTotals]);

      const workerCount = useMemo(() => {
        if (!extracted) return 0;
        const ids = new Set(extracted.rows.map(r => r.worker_id).filter(Boolean));
        return ids.size;
      }, [extracted]);

      const exportCSV = () => {
        if (!extracted) return;
        const escape = (v) => {
          const s = (v == null ? '' : v).toString();
          return (s.includes(',') || s.includes('"') || s.includes('\n'))
            ? '"' + s.replace(/"/g, '""') + '"'
            : s;
        };
        const headers = ['WorkerID', 'Worker Name (Khmer)', 'Product Type', 'OB #', 'Operation',
          ...extracted.time_slots, 'Daily Total'];
        const lines = [headers.map(escape).join(',')];
        extracted.rows.forEach(r => {
          const cells = [
            r.worker_id, r.worker_name_khmer, r.product_type, r.ob_number, r.operation_khmer,
            ...r.counts.map(c => c == null ? '' : c), rowTotal(r.counts)
          ];
          lines.push(cells.map(escape).join(','));
        });
        lines.push(['TOTAL', '', '', '', '', ...colTotals, grandTotal].map(escape).join(','));
        const csv = '\uFEFF' + lines.join('\n');
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `OPPA_${(extracted.header.date || 'sheet').replace(/[^\w.-]/g, '_')}.csv`;
        a.click();
        URL.revokeObjectURL(url);
      };

      const exportJSON = () => {
        if (!extracted) return;
        const blob = new Blob([JSON.stringify(extracted, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `OPPA_${(extracted.header.date || 'sheet').replace(/[^\w.-]/g, '_')}.json`;
        a.click();
        URL.revokeObjectURL(url);
      };

      const reset = () => {
        setImageFile(null);
        setImagePreview(null);
        setExtracted(null);
        setError(null);
        setRawResponse('');
        setRefineMessage('');
      };

      return (
        <div className="min-h-screen pies-root">
          {/* Header */}
          <header className="bg-navy" style={{ borderBottom: '4px solid #C45911' }}>
            <div className="px-8 py-5 flex items-center justify-between" style={{ maxWidth: 1600, margin: '0 auto' }}>
              <div className="flex items-center gap-6">
                <div className="ff-mono text-white font-bold" style={{ fontSize: 24, letterSpacing: '0.2em' }}>PIES</div>
                <div style={{ height: 32, width: 1, background: 'rgba(255,255,255,0.25)' }}></div>
                <div>
                  <div className="ff-mono text-xs uppercase" style={{ color: 'rgba(255,255,255,0.6)', letterSpacing: '0.15em' }}>
                    Pactics Industrial Engineering System
                  </div>
                  <div className="text-base font-semibold text-white" style={{ letterSpacing: '-0.01em' }}>
                    OPPA Sheet Digitizer
                  </div>
                </div>
              </div>
              <div className="flex items-center gap-3">
                <span className="badge-model">
                  <span className="pulse-dot"></span>
                  {MODEL_ID}
                </span>
                <div className="ff-mono text-xs uppercase" style={{ color: 'rgba(255,255,255,0.5)', letterSpacing: '0.1em' }}>
                  v0.3 · Siem Reap
                </div>
              </div>
            </div>
          </header>

          <main className="px-8 py-8" style={{ maxWidth: 1600, margin: '0 auto' }}>

            {/* STAGE 1: Upload */}
            {!imagePreview && (
              <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div className="lg:col-span-2">
                  <div
                    onDrop={onDrop}
                    onDragOver={(e) => e.preventDefault()}
                    onClick={() => fileInputRef.current && fileInputRef.current.click()}
                    className="dropzone bg-card flex flex-col items-center justify-center cursor-pointer p-12 text-center"
                    style={{ aspectRatio: '4/3' }}
                  >
                    <div className="flex items-center justify-center mb-6 border-2 border-navy" style={{ width: 80, height: 80 }}>
                      <FileImage strokeWidth={1.5} className="text-navy" size={40} />
                    </div>
                    <div className="text-2xl font-semibold mb-2 text-navy" style={{ letterSpacing: '-0.01em' }}>
                      Drop OPPA sheet image here
                    </div>
                    <div className="ff-mono text-sm text-mute mb-6">
                      or click to browse · PNG / JPG / WebP
                    </div>
                    <button className="btn-primary ff-mono px-6 py-3 text-sm uppercase flex items-center gap-2" style={{ letterSpacing: '0.15em' }}>
                      <Upload size={16} />
                      Select image
                    </button>
                    <input
                      ref={fileInputRef} type="file" accept="image/*" className="hidden"
                      onChange={(e) => handleFile(e.target.files && e.target.files[0])}
                    />
                  </div>
                </div>

                <aside className="bg-card border border-line p-6">
                  <div className="mb-5">
                    <div className="ff-mono text-xs uppercase text-orange mb-1" style={{ letterSpacing: '0.15em' }}>How it works</div>
                    <div className="text-lg font-semibold text-navy" style={{ letterSpacing: '-0.01em' }}>Three steps</div>
                  </div>
                  <ol className="space-y-4 text-sm">
                    {[
                      { n: '01', t: 'Upload the sheet photo', d: 'Clear, flat, well-lit shots work best. Avoid heavy shadow or skew.' },
                      { n: '02', t: 'Claude Opus 4.7 reads it', d: 'Khmer names, English product types, OB numbers, and the 10-column hourly grid extracted to a structured table.' },
                      { n: '03', t: 'Refine Khmer & export', d: 'Hit "Refine Khmer" for a focused second pass if names look wrong. Edit any cell. Then download CSV or JSON.' }
                    ].map(s => (
                      <li key={s.n} className="flex gap-4">
                        <div className="ff-mono text-xs text-orange" style={{ width: 24, flexShrink: 0, paddingTop: 2 }}>{s.n}</div>
                        <div>
                          <div className="font-semibold text-navy">{s.t}</div>
                          <div className="text-mute mt-1" style={{ fontSize: 12 }}>{s.d}</div>
                        </div>
                      </li>
                    ))}
                  </ol>
                  <div className="mt-6 pt-4 border-t border-line ff-mono text-xs text-faint">
                    OPPA · Operator Performance Per Hour Analysis
                  </div>
                </aside>
              </div>
            )}

            {/* STAGE 2: Review + Extract */}
            {imagePreview && !extracted && (
              <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div className="lg:col-span-2 bg-card border border-line p-4">
                  <img src={imagePreview} alt="OPPA sheet" style={{ width: '100%', height: 'auto', display: 'block' }} />
                </div>
                <aside className="bg-card border border-line p-6">
                  <div className="mb-4">
                    <div className="ff-mono text-xs uppercase text-orange mb-1" style={{ letterSpacing: '0.15em' }}>
                      {loading ? 'Reading sheet' : 'Image loaded'}
                    </div>
                    <div className="text-xl font-semibold text-navy" style={{ letterSpacing: '-0.01em' }}>
                      {loading ? 'Working...' : 'Ready to extract'}
                    </div>
                  </div>
                  <p className="text-sm text-mute leading-relaxed mb-5">
                    Claude Opus 4.7 will read the worker IDs, Khmer names, product types, OB numbers, and all hourly counts. This usually takes 20–40 seconds.
                  </p>
                  <button
                    onClick={extractData}
                    disabled={loading}
                    className="btn-primary ff-mono w-full px-6 py-4 text-sm uppercase flex items-center justify-center gap-2 mb-3"
                    style={{ letterSpacing: '0.15em' }}
                  >
                    {loading ? (
                      <><Loader2 size={16} className="animate-spin" /> Reading sheet...</>
                    ) : (
                      <><Sparkles size={16} /> Extract table</>
                    )}
                  </button>
                  <button
                    onClick={reset} disabled={loading}
                    className="btn-ghost ff-mono w-full px-6 py-3 text-sm uppercase"
                    style={{ letterSpacing: '0.15em' }}
                  >
                    Choose different image
                  </button>
                </aside>
              </div>
            )}

            {/* STAGE 3: Extracted */}
            {extracted && (
              <div>
                {/* Action bar */}
                <div className="flex flex-wrap items-center justify-between gap-3 mb-5 pb-4 border-b border-line">
                  <div className="flex items-center gap-5 flex-wrap">
                    <div className="ff-mono text-xs uppercase text-orange" style={{ letterSpacing: '0.15em' }}>Sheet header</div>
                    <div className="flex items-center gap-2">
                      <label className="ff-mono text-xs text-mute">FORM</label>
                      <input
                        value={extracted.header.form_type || ''}
                        onChange={(e) => updateHeader('form_type', e.target.value)}
                        className="ff-mono text-sm px-2 py-1 border border-line"
                        style={{ width: 80 }}
                      />
                    </div>
                    <div className="flex items-center gap-2">
                      <label className="ff-mono text-xs text-mute">DATE</label>
                      <input
                        value={extracted.header.date || ''}
                        onChange={(e) => updateHeader('date', e.target.value)}
                        className="ff-mono text-sm px-2 py-1 border border-line"
                        style={{ width: 110 }}
                        placeholder="DD.MM.YY"
                      />
                    </div>
                    <div className="ff-mono text-xs text-faint">
                      {extracted.rows.length} rows · {workerCount} workers
                    </div>
                  </div>

                  <div className="flex items-center gap-2 flex-wrap">
                    <button
                      onClick={refineKhmer}
                      disabled={refining || loading || extracted.rows.length === 0}
                      className="btn-accent ff-mono text-xs uppercase px-4 py-2 flex items-center gap-2"
                      style={{ letterSpacing: '0.1em' }}
                      title="Re-read only the Khmer cells with focused, language-specific prompting"
                    >
                      {refining ? (
                        <><Loader2 size={14} className="animate-spin" /> Refining...</>
                      ) : (
                        <><Languages size={14} /> Refine Khmer</>
                      )}
                    </button>
                    <button
                      onClick={() => setShowImage(s => !s)}
                      className="btn-ghost ff-mono text-xs uppercase px-3 py-2 flex items-center gap-2"
                      style={{ letterSpacing: '0.1em' }}
                    >
                      {showImage ? <EyeOff size={14} /> : <Eye size={14} />}
                      {showImage ? 'Hide image' : 'Show image'}
                    </button>
                    <button
                      onClick={exportJSON}
                      className="btn-ghost ff-mono text-xs uppercase px-3 py-2 flex items-center gap-2"
                      style={{ letterSpacing: '0.1em' }}
                    >
                      <FileCode size={14} /> JSON
                    </button>
                    <button
                      onClick={exportCSV}
                      className="btn-primary ff-mono text-xs uppercase px-4 py-2 flex items-center gap-2"
                      style={{ letterSpacing: '0.1em' }}
                    >
                      <Download size={14} /> Export CSV
                    </button>
                    <button
                      onClick={reset}
                      className="btn-warn ff-mono text-xs uppercase px-3 py-2 flex items-center gap-2"
                      style={{ letterSpacing: '0.1em' }}
                    >
                      <RefreshCw size={14} /> New
                    </button>
                  </div>
                </div>

                {/* Refine success message */}
                {refineMessage && (
                  <div className="bg-green-soft border border-green p-3 mb-4 flex items-start gap-3">
                    <Info size={16} style={{ color: '#2E7D32', flexShrink: 0, marginTop: 2 }} />
                    <div className="text-sm text-green flex-1">{refineMessage}</div>
                    <button onClick={() => setRefineMessage('')} className="text-green hover:opacity-70">
                      <X size={14} />
                    </button>
                  </div>
                )}

                {/* Khmer tip banner */}
                <div className="bg-navy-soft border border-line p-3 mb-4 flex items-start gap-3">
                  <Info size={16} style={{ color: '#071D49', flexShrink: 0, marginTop: 2 }} />
                  <div className="text-sm flex-1">
                    <span className="font-semibold text-navy">Khmer text accuracy:</span>
                    <span className="text-mute"> Handwritten Khmer is the hardest part of OCR. If a name or operation looks wrong, click </span>
                    <span className="ff-mono text-navy" style={{ fontWeight: 600 }}>Refine Khmer</span>
                    <span className="text-mute"> to re-read only those cells with deeper language-specific prompting, or edit them directly. Cells ending in "?" mean Claude wasn't fully sure.</span>
                  </div>
                </div>

                {/* Image + Table */}
                <div className="grid gap-6" style={{ gridTemplateColumns: showImage ? '380px 1fr' : '1fr' }}>
                  {showImage && (
                    <div className="bg-card border border-line p-3" style={{ alignSelf: 'start', position: 'sticky', top: 16 }}>
                      <img src={imagePreview} alt="OPPA sheet" style={{ width: '100%', height: 'auto', display: 'block' }} />
                      <div className="ff-mono text-xs text-faint mt-2 text-center">Source image (reference)</div>
                    </div>
                  )}

                  <div className="bg-card border border-line" style={{ overflowX: 'auto', position: 'relative' }}>
                    {refining && (
                      <div style={{
                        position: 'absolute', inset: 0, background: 'rgba(255,255,255,0.7)',
                        display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 10
                      }}>
                        <div className="bg-card border border-navy px-5 py-4 flex items-center gap-3">
                          <Loader2 className="animate-spin text-navy" size={20} />
                          <div>
                            <div className="ff-mono text-xs uppercase text-orange" style={{ letterSpacing: '0.15em' }}>Refining</div>
                            <div className="text-sm font-semibold text-navy">Re-reading Khmer cells...</div>
                          </div>
                        </div>
                      </div>
                    )}

                    <table className="oppa-table">
                      <thead>
                        <tr>
                          <th>Worker ID</th>
                          <th>Name (KH)</th>
                          <th>Product</th>
                          <th>OB#</th>
                          <th>Operation</th>
                          {extracted.time_slots.map((s, i) => <th key={i} className="col-slot">{s}</th>)}
                          <th className="col-total">Total</th>
                          <th style={{ width: 28 }}></th>
                        </tr>
                      </thead>
                      <tbody>
                        {extracted.rows.length === 0 && (
                          <tr>
                            <td colSpan={extracted.time_slots.length + 7} style={{ padding: 24, textAlign: 'center' }} className="text-mute text-sm">
                              No data rows extracted. Add one manually below, or try a clearer photo.
                            </td>
                          </tr>
                        )}
                        {extracted.rows.map((row, idx) => {
                          const nameUncertain = (row.worker_name_khmer || '').includes('?');
                          const opUncertain = (row.operation_khmer || '').includes('?');
                          return (
                            <tr key={idx} className={idx % 2 === 1 ? 'row-alt' : ''}>
                              <td>
                                <input
                                  value={row.worker_id || ''}
                                  onChange={(e) => updateCell(idx, 'worker_id', e.target.value)}
                                  className="grid-cell-input ff-mono"
                                  style={{ width: 100, fontSize: 11 }}
                                />
                              </td>
                              <td>
                                <input
                                  value={row.worker_name_khmer || ''}
                                  onChange={(e) => updateCell(idx, 'worker_name_khmer', e.target.value)}
                                  className={`grid-cell-input ff-khmer ${nameUncertain ? 'khmer-uncertain' : ''}`}
                                  style={{ width: 120, fontSize: 14 }}
                                />
                              </td>
                              <td>
                                <input
                                  value={row.product_type || ''}
                                  onChange={(e) => updateCell(idx, 'product_type', e.target.value)}
                                  className="grid-cell-input"
                                  style={{ width: 100, fontSize: 11 }}
                                />
                              </td>
                              <td>
                                <input
                                  value={row.ob_number || ''}
                                  onChange={(e) => updateCell(idx, 'ob_number', e.target.value)}
                                  className="grid-cell-input ff-mono"
                                  style={{ width: 60, fontSize: 11 }}
                                />
                              </td>
                              <td>
                                <input
                                  value={row.operation_khmer || ''}
                                  onChange={(e) => updateCell(idx, 'operation_khmer', e.target.value)}
                                  className={`grid-cell-input ff-khmer ${opUncertain ? 'khmer-uncertain' : ''}`}
                                  style={{ width: 150, fontSize: 14 }}
                                />
                              </td>
                              {row.counts.map((c, i) => {
                                const isUncertain = typeof c === 'string' && c.includes('?');
                                return (
                                  <td key={i}>
                                    <input
                                      value={c == null ? '' : c}
                                      onChange={(e) => updateCount(idx, i, e.target.value)}
                                      className={`grid-cell-input ff-mono ${isUncertain ? 'count-uncertain' : ''}`}
                                      style={{ width: 44, fontSize: 11, textAlign: 'center' }}
                                    />
                                  </td>
                                );
                              })}
                              <td className="cell-total">{rowTotal(row.counts) || ''}</td>
                              <td>
                                <button onClick={() => deleteRow(idx)} className="row-delete" title="Delete row">×</button>
                              </td>
                            </tr>
                          );
                        })}
                      </tbody>
                      {extracted.rows.length > 0 && (
                        <tfoot>
                          <tr>
                            <td colSpan={5} className="label-cell">Column total</td>
                            {colTotals.map((t, i) => <td key={i}>{t || ''}</td>)}
                            <td className="grand">{grandTotal}</td>
                            <td></td>
                          </tr>
                        </tfoot>
                      )}
                    </table>
                    <div className="border-t border-line p-3">
                      <button onClick={addRow} className="ff-mono text-xs uppercase text-navy flex items-center gap-1 hover:opacity-70" style={{ letterSpacing: '0.1em' }}>
                        <Plus size={14} /> Add row
                      </button>
                    </div>
                  </div>
                </div>

                <div className="mt-4 ff-mono text-xs text-faint flex items-center gap-3 flex-wrap">
                  <span style={{ display: 'inline-flex', alignItems: 'center', gap: 6 }}>
                    <span style={{ width: 8, height: 8, background: '#C45911', display: 'inline-block' }}></span>
                    Orange = Claude was unsure — verify against the image
                  </span>
                </div>
              </div>
            )}

            {/* Error panel */}
            {error && !loading && !refining && (
              <div className="mt-5 bg-yellow border border-orange p-4 flex items-start gap-3">
                <AlertTriangle size={20} style={{ color: '#C45911', flexShrink: 0, marginTop: 2 }} />
                <div className="flex-1 text-sm">
                  <div className="font-semibold text-orange">Something went wrong</div>
                  <div className="ff-mono text-xs mt-1" style={{ color: '#1A1A1A' }}>{error}</div>
                  {rawResponse && (
                    <details className="mt-3">
                      <summary className="cursor-pointer text-xs underline text-mute">Show raw model response</summary>
                      <pre className="mt-2 p-2 bg-card border border-line" style={{ fontSize: 10, overflow: 'auto', maxHeight: 240 }}>
                        {rawResponse}
                      </pre>
                    </details>
                  )}
                </div>
                <button onClick={() => setError(null)} className="text-mute hover:text-orange">
                  <X size={16} />
                </button>
              </div>
            )}
          </main>
